<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 100" fill="none">
  <!-- Diamond / Ethereum-style icon -->
  <g transform="translate(6, 4)">
    <!-- Outer diamond outline -->
    <polygon
      points="44,2 80,50 44,98 8,50"
      stroke="#1565C0"
      stroke-width="4"
      fill="none"
      stroke-linejoin="round"
    />
    <!-- Top horizontal bar of E -->
    <line x1="22" y1="34" x2="63" y2="34" stroke="#1565C0" stroke-width="4" stroke-linecap="round"/>
    <!-- Middle horizontal bar of E -->
    <line x1="18" y1="50" x2="59" y2="50" stroke="#1565C0" stroke-width="4" stroke-linecap="round"/>
    <!-- Bottom horizontal bar of E -->
    <line x1="22" y1="66" x2="63" y2="66" stroke="#1565C0" stroke-width="4" stroke-linecap="round"/>
    <!-- Left vertical bar of E -->
    <line x1="22" y1="34" x2="22" y2="66" stroke="#1565C0" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- "Ether" word -->
  <text
    x="102"
    y="70"
    font-family="'Arial Black', 'Arial', 'Helvetica Neue', sans-serif"
    font-size="46"
    font-weight="900"
    fill="#1565C0"
    letter-spacing="-1"
  >Ether</text>

  <!-- "Authority" word — placed after "Ether" with exact spacing -->
  <text
    x="268"
    y="70"
    font-family="'Arial Black', 'Arial', 'Helvetica Neue', sans-serif"
    font-size="46"
    font-weight="900"
    fill="#1565C0"
    letter-spacing="-1"
  >Authority</text>
</svg>
